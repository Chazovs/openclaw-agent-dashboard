<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Agent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e6e6e6; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: #16213e; border-radius: 10px; }
        h1 { color: #4cc9f0; font-size: 2.5rem; margin-bottom: 10px; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .agent-card { background: #16213e; border-radius: 10px; padding: 20px; border: 2px solid #0f3460; }
        .agent-header { display: flex; align-items: center; margin-bottom: 15px; }
        .pixel-avatar { font-size: 2rem; margin-right: 15px; }
        .agent-info h3 { color: #4cc9f0; margin-bottom: 5px; }
        .status-working { color: #4cc9f0; }
        .status-sleeping { color: #f0a04c; }
        .status-idle { color: #a9a9a9; }
        .status-error { color: #f05454; }
        .loading { text-align: center; padding: 40px; color: #a9a9a9; }
        .error { color: #f05454; padding: 20px; background: #2d1a1a; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OpenClaw Agent Dashboard</h1>
            <p class="subtitle">Простая версия с прямым подключением к API</p>
        </header>
        
        <div id="agents-container" class="agents-grid">
            <div class="loading" id="loading">Загрузка агентов...</div>
        </div>
        
        <div id="error-container" style="display: none;"></div>
    </div>
    
    <script>
        async function loadAgents() {
            const container = document.getElementById('agents-container');
            const loading = document.getElementById('loading');
            const errorContainer = document.getElementById('error-container');
            
            try {
                console.log('Загрузка агентов из API...');
                const response = await fetch('/api/agents');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const agents = await response.json();
                console.log(`Получено ${agents.length} агентов:`, agents);
                
                // Hide loading
                loading.style.display = 'none';
                
                // Clear container
                container.innerHTML = '';
                
                // Display agents
                if (agents.length === 0) {
                    container.innerHTML = '<div class="loading">Агентов нет</div>';
                    return;
                }
                
                agents.forEach(agent => {
                    const card = document.createElement('div');
                    card.className = 'agent-card';
                    
                    const statusClass = `status-${agent.status}`;
                    
                    card.innerHTML = `
                        <div class="agent-header">
                            <div class="pixel-avatar">${agent.emoji}</div>
                            <div class="agent-info">
                                <h3>${agent.name}</h3>
                                <div class="agent-id">ID: ${agent.id}</div>
                            </div>
                        </div>
                        <div class="agent-details">
                            <p><strong>Статус:</strong> <span class="${statusClass}">${agent.status}</span></p>
                            <p><strong>Рабочее пространство:</strong> ${agent.workspace}</p>
                            <p><strong>Описание:</strong> ${agent.description}</p>
                            <p><strong>Последняя активность:</strong> ${new Date(agent.lastSeen).toLocaleString()}</p>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Ошибка загрузки агентов:', error);
                loading.style.display = 'none';
                errorContainer.style.display = 'block';
                errorContainer.innerHTML = `
                    <div class="error">
                        <h3>❌ Ошибка подключения к API</h3>
                        <p>${error.message}</p>
                        <p>Проверьте:</p>
                        <ul>
                            <li>Сервер дашборда запущен на порту 3000</li>
                            <li>API доступен по адресу: <code>/api/agents</code></li>
                            <li>Нет ошибок CORS</li>
                        </ul>
                    </div>
                `;
            }
        }
        
        // Load agents on page load
        window.addEventListener('load', loadAgents);
        
        // Auto-refresh every 30 seconds
        setInterval(loadAgents, 30000);
    </script>
</body>
</html>
