<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent Dashboard - Полная версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e6e6e6; line-height: 1.6; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: #16213e; border-radius: 10px; border: 2px solid #0f3460; }
        h1 { color: #4cc9f0; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 10px rgba(76, 201, 240, 0.5); }
        .subtitle { color: #a9a9a9; font-size: 1.2rem; }
        
        /* Stats Panel */
        .stats-panel { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: #16213e; 
            border-radius: 10px; 
            padding: 20px; 
            text-align: center;
            border: 2px solid #0f3460;
        }
        .stat-value { 
            font-size: 2.5rem; 
            color: #4cc9f0; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        .stat-label { 
            color: #a9a9a9; 
            font-size: 0.9rem; 
        }
        
        /* Filter Panel */
        .filter-panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #0f3460;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            align-items: end;
        }
        .filter-group { display: flex; flex-direction: column; }
        .filter-label { color: #a9a9a9; margin-bottom: 8px; font-size: 0.9rem; }
        .filter-input, .filter-select {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #e6e6e6;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: #4cc9f0;
            box-shadow: 0 0 10px rgba(76, 201, 240, 0.3);
        }
        
        /* Agents Grid */
        .agents-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px;
        }
        
        /* Agent Card */
        .agent-card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #0f3460;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .agent-card:hover {
            transform: translateY(-5px);
            border-color: #4cc9f0;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .pixel-avatar {
            font-size: 2.5rem;
            margin-right: 15px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            border-radius: 10px;
            border: 2px solid #0f3460;
        }
        .agent-info h3 {
            color: #4cc9f0;
            margin-bottom: 5px;
            font-size: 1.3rem;
        }
        .agent-id {
            color: #a9a9a9;
            font-size: 0.9rem;
            font-family: monospace;
        }
        
        /* Status Indicators */
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-working { background: #4cc9f0; box-shadow: 0 0 10px #4cc9f0; }
        .status-idle { background: #f0a04c; box-shadow: 0 0 10px #f0a04c; }
        .status-sleeping { background: #a9a9a9; }
        .status-error { background: #f05454; box-shadow: 0 0 10px #f05454; }
        
        .status-text {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: #1a1a2e;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        
        /* Agent Details */
        .agent-details {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #0f3460;
        }
        .agent-details p {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .agent-details strong {
            color: #a9a9a9;
            margin-right: 5px;
        }
        
        /* Activity History */
        .activity-panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border: 2px solid #0f3460;
            display: none;
        }
        .activity-panel.active {
            display: block;
        }
        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .activity-timeline {
            max-height: 300px;
            overflow-y: auto;
        }
        .activity-item {
            padding: 10px 15px;
            margin-bottom: 10px;
            background: #1a1a2e;
            border-radius: 5px;
            border-left: 4px solid #4cc9f0;
        }
        .activity-time {
            color: #a9a9a9;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        .activity-task {
            color: #e6e6e6;
        }
        
        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 40px;
            color: #a9a9a9;
            grid-column: 1 / -1;
        }
        .error {
            color: #f05454;
            padding: 20px;
            background: #2d1a1a;
            border-radius: 5px;
            grid-column: 1 / -1;
        }
        
        /* Last Update */
        .last-update {
            text-align: center;
            color: #a9a9a9;
            font-size: 0.9rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #0f3460;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OpenClaw Agent Dashboard</h1>
            <p class="subtitle">Полная версия с фильтрацией, статистикой и историей активности</p>
        </header>
        
        <!-- Stats Panel -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">0</div>
                <div class="stat-label">Всего агентов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="working-agents">0</div>
                <div class="stat-label">Работают</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="idle-agents">0</div>
                <div class="stat-label">Ожидают</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sleeping-agents">0</div>
                <div class="stat-label">Спят</div>
            </div>
        </div>
        
        <!-- Filter Panel -->
        <div class="filter-panel">
            <div class="filter-group">
                <label class="filter-label">Поиск по имени</label>
                <input type="text" id="search-filter" class="filter-input" placeholder="Введите имя агента...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Статус</label>
                <select id="status-filter" class="filter-select">
                    <option value="all">Все статусы</option>
                    <option value="working">Работают</option>
                    <option value="idle">Ожидают</option>
                    <option value="sleeping">Спят</option>
                    <option value="error">Ошибка</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Рабочее пространство</label>
                <select id="workspace-filter" class="filter-select">
                    <option value="all">Все пространства</option>
                    <!-- Динамически заполнится -->
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Сортировка</label>
                <select id="sort-filter" class="filter-select">
                    <option value="name">По имени (А-Я)</option>
                    <option value="status">По статусу</option>
                    <option value="workspace">По пространству</option>
                    <option value="lastSeen">По активности</option>
                </select>
            </div>
        </div>
        
        <!-- Agents Grid -->
        <div class="agents-grid" id="agents-container">
            <div class="loading" id="loading">Загрузка агентов...</div>
        </div>
        
        <!-- Activity Panel (скрыт по умолчанию) -->
        <div class="activity-panel" id="activity-panel">
            <div class="activity-header">
                <h3>История активности: <span id="activity-agent-name"></span></h3>
                <button onclick="closeActivityPanel()" class="filter-input" style="cursor: pointer;">✕ Закрыть</button>
            </div>
            <div class="activity-timeline" id="activity-timeline">
                <div class="loading">Загрузка истории активности...</div>
            </div>
        </div>
        
        <!-- Last Update -->
        <div class="last-update">
            Последнее обновление: <span id="last-update">загрузка...</span>
            • Автообновление каждые 30 секунд
        </div>
        
        <div id="error-container" style="display: none;"></div>
    </div>
    
    <script>
        // Global variables
        let allAgents = [];
        let currentActivityAgentId = null;
        
        // Load agents from API
        async function loadAgents() {
            const container = document.getElementById('agents-container');
            const loading = document.getElementById('loading');
            const errorContainer = document.getElementById('error-container');
            
            try {
                console.log('Загрузка агентов из API...');
                const response = await fetch('/api/agents');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const agents = await response.json();
                console.log(`Получено ${agents.length} агентов`);
                
                // Store all agents
                allAgents = agents;
                
                // Update stats
                updateStats(agents);
                
                // Update workspace filter
                updateWorkspaceFilter(agents);
                
                // Apply current filters
                applyFilters();
                
                // Update last update time
                updateLastUpdate();
                
                // Hide loading/error
                loading.style.display = 'none';
                errorContainer.style.display = 'none';
                
            } catch (error) {
                console.error('Ошибка загрузки агентов:', error);
                loading.style.display = 'none';
                errorContainer.style.display = 'block';
                errorContainer.innerHTML = `
                    <div class="error">
                        <h3>❌ Ошибка подключения к API</h3>
                        <p>${error.message}</p>
                        <p>Проверьте что сервер дашборда запущен на порту 3000</p>
                    </div>
                `;
            }
        }
        
        // Update statistics
        function updateStats(agents) {
            const total = agents.length;
            const working = agents.filter(a => a.status === 'working').length;
            const idle = agents.filter(a => a.status === 'idle').length;
            const sleeping = agents.filter(a => a.status === 'sleeping').length;
            
            document.getElementById('total-agents').textContent = total;
            document.getElementById('working-agents').textContent = working;
            document.getElementById('idle-agents').textContent = idle;
            document.getElementById('sleeping-agents').textContent = sleeping;
        }
        
        // Update workspace filter options
        function updateWorkspaceFilter(agents) {
            const workspaceFilter = document.getElementById('workspace-filter');
            const workspaces = [...new Set(agents.map(a => a.workspace))].sort();
            
            // Keep "all" option and add new workspaces
            const allOption = workspaceFilter.querySelector('option[value="all"]');
            workspaceFilter.innerHTML = '';
            workspaceFilter.appendChild(allOption);
            
            workspaces.forEach(workspace => {
                const option = document.createElement('option');
                option.value = workspace;
                option.textContent = workspace;
                workspaceFilter.appendChild(option);
            });
        }
        
        // Apply filters
        function applyFilters() {
            const container = document.getElementById('agents-container');
            const searchFilter = document.getElementById('search-filter').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            const workspaceFilter = document.getElementById('workspace-filter').value;
            const sortFilter = document.getElementById('sort-filter').value;
            
            // Filter agents
            let filteredAgents = allAgents.filter(agent => {
                // Search filter
                if (searchFilter && !agent.name.toLowerCase().includes(searchFilter)) {
                    return false;
                }
                
                // Status filter
                if (statusFilter !== 'all' && agent.status !== statusFilter) {
                    return false;
                }
                
                // Workspace filter
                if (workspaceFilter !== 'all' && agent.workspace !== workspaceFilter) {
                    return false;
                }
                
                return true;
            });
            
            // Sort agents
            filteredAgents.sort((a, b) => {
                switch (sortFilter) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'status':
                        return a.status.localeCompare(b.status);
                    case 'workspace':
                        return a.workspace.localeCompare(b.workspace);
                    case 'lastSeen':
                        return new Date(b.lastSeen) - new Date(a.lastSeen);
                    default:
                        return 0;
                }
            });
            
            // Clear container
            container.innerHTML = '';
            
            // Display filtered agents
            if (filteredAgents.length === 0) {
                container.innerHTML = '<div class="loading">Агентов не найдено</div>';
                return;
            }
            
            filteredAgents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.dataset.agentId = agent.id;
                
                // Status class
                const statusClass = `status-${agent.status}`;
                
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="pixel-avatar">${agent.emoji}</div>
                        <div class="agent-info">
                            <h3>${agent.name}</h3>
                            <div class="agent-id">ID: ${agent.id}</div>
                        </div>
                    </div>
                    <div class="status-text">
                        <span class="status-indicator ${statusClass}"></span>
                        <span>${getStatusText(agent.status)}</span>
                    </div>
                    <div class="agent-details">
                        <p><strong>Рабочее пространство:</strong> ${agent.workspace}</p>
                        <p><strong>Описание:</strong> ${agent.description}</p>
                        <p><strong>Последняя активность:</strong> ${new Date(agent.lastSeen).toLocaleString()}</p>
                        <button onclick="loadActivityHistory('${agent.id}', '${agent.name}')" 
                                class="filter-input"
